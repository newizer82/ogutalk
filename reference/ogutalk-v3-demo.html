// 톤별 전체 재생 길이(초) — 반복 간격 계산용
const TONE_DURATION = { 여유:1.1, 바쁨:0.65, 화남:0.65, 유쾌:0.95 };

function playOguSound(tone = "유쾌", repeat = 1) {
  try {
    const ctx      = new (window.AudioContext || window.webkitAudioContext)();
    const baseTime = ctx.currentTime;
    const interval = TONE_DURATION[tone] || 0.9; // 반복 간격
    const configs  = {
      여유: [
        { freq:392, start:0,    dur:0.4, type:"sine",     gain:0.25 },
        { freq:523, start:0.35, dur:0.5, type:"sine",     gain:0.20 },
      ],
      바쁨: [
        { freq:659, start:0,    dur:0.12, type:"square",  gain:0.35 },
        { freq:784, start:0.14, dur:0.12, type:"square",  gain:0.35 },
        { freq:988, start:0.28, dur:0.14, type:"square",  gain:0.35 },
      ],
      화남: [
        { freq:880, start:0,    dur:0.15, type:"sawtooth", gain:0.45 },
        { freq:698, start:0.1,  dur:0.15, type:"sawtooth", gain:0.40 },
        { freq:523, start:0.2,  dur:0.20, type:"sawtooth", gain:0.35 },
      ],
      유쾌: [
        { freq:523, start:0,    dur:0.2, type:"triangle", gain:0.3 },
        { freq:659, start:0.18, dur:0.2, type:"triangle", gain:0.3 },
        { freq:784, start:0.36, dur:0.3, type:"triangle", gain:0.3 },
      ],
    };
    const notes = configs[tone] || configs["유쾌"];
    for (let r = 0; r < Math.max(1, repeat); r++) {
      const offset = r * interval;
      notes.forEach(({ freq, start, dur, type, gain: g }) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type;
        const t = baseTime + offset + start;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(g, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.05);
      });
    }
  } catch(_) {}
}

// alarmHour: 알람이 발동된 시(時) — 59분 알람이므로 다음 정시를 안내
// repeat: "오구" 반복 횟수
function speakTime(voiceId, alarmHour, repeat = 1) {
  if (!window.speechSynthesis) return;
  const vc       = VOICE_CHARACTERS.find(v => v.id === voiceId) || VOICE_CHARACTERS[0];
  const nextHour = (alarmHour + 1) % 24; // 1:59 → 2시, 23:59 → 0시
  const txt      = (VOICE_TEXTS[voiceId] || VOICE_TEXTS.boy)(nextHour, repeat);
  const utt      = new SpeechSynthesisUtterance(txt);
  utt.lang  = "ko-KR";
  utt.rate  = vc.rate; utt.pitch = vc.pitch;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

      oguTone, oguRepeat, voiceChar, voiceEnabled, soundOn,
      alarmMode, immersionAlerts,
    }, null, 2);
    const blob = new Blob([data], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `ogutalk-backup-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setBackupMsg("✅ 백업 파일 저장 완료!");
    setTimeout(() => setBackupMsg(""), 3000);
  };

  // ── 백업 복원
  const importBackup = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if(d.todos)        setTodos(d.todos);
        if(d.goals)        setGoals(d.goals);
        if(d.userKeywords) setUserKeywords(d.userKeywords);
        if(d.alarmHours)   setAlarmHours(d.alarmHours);
        if(d.oguTone)      setOguTone(d.oguTone);
        if(d.oguRepeat)    setOguRepeat(d.oguRepeat);
        if(d.voiceChar)    setVoiceChar(d.voiceChar);
        if(typeof d.voiceEnabled!=="undefined") setVoiceEnabled(d.voiceEnabled);
        if(typeof d.soundOn!=="undefined")      setSoundOn(d.soundOn);
        if(d.alarmMode)    setAlarmMode(d.alarmMode);
        if(d.immersionAlerts) setImmersionAlerts(d.immersionAlerts);
        setBackupMsg("✅ 복원 완료! 데이터가 반영됐습니다.");
        setTimeout(() => setBackupMsg(""), 4000);
      } catch(err) {
        setBackupMsg("⚠️ 파일 형식 오류. 올바른 백업 파일을 선택해주세요.");
        setTimeout(() => setBackupMsg(""), 4000);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };
  const weekday = ["일","월","화","수","목","금","토"][now.getDay()];
  const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${weekday})`;

  const nextAlarm = (() => {
    const h = now.getHours(), m = now.getMinutes();
    for (let i=0; i<24; i++) {
      const ch = (h+i)%24;
      if (alarmHours[ch] && (i>0 || m<59)) {
        const diff = ((ch*60+59)-(h*60+m)+1440)%1440;
        const dh = Math.floor(diff/60), dm = diff%60;
        return { time:`${pad(ch)}:59`, diff: dh>0 ? `${dh}시간 ${dm}분 후` : `${dm}분 후` };
      }
    }
    return { time:"없음", diff:"" };
  })();

  // ── 몰입 경고 팝업
  if (immersionPopup) {
    const msgs = {
      "30분": { emoji:"😮", title:"스마트폰 30분 경과!", sub:"잠깐 눈을 쉬고 스트레칭해보세요", color:"#f59e0b", grad:"linear-gradient(135deg,rgba(245,158,11,0.25),rgba(251,191,36,0.1))" },
      "1시간": { emoji:"😱", title:"스마트폰 1시간 경과!", sub:"장시간 사용은 눈과 목에 무리를 줘요", color:"#ef4444", grad:"linear-gradient(135deg,rgba(239,68,68,0.25),rgba(248,113,113,0.1))" },
    };
    const info = msgs[immersionLevel] || msgs["30분"];
    return (
      <div style={S.root}>
        <div style={{ ...S.phone, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          background:info.grad, backdropFilter:"blur(20px)" }}>
          <div style={{ fontSize:72, marginBottom:16, animation:"pulse 1s infinite" }}>{info.emoji}</div>
          <div style={{ fontSize:20, fontWeight:900, color:"#f1f5f9", textAlign:"center", marginBottom:8 }}>
            {info.title}
          </div>
          <div style={{ color:"#94a3b8", fontSize:13, textAlign:"center", marginBottom:6, lineHeight:1.6 }}>
            {info.sub}
          </div>
          <div style={{ color:info.color, fontSize:28, fontWeight:900, marginBottom:6 }}>
            {pad(Math.floor(immersion/60))}:{pad(Math.floor(immersion%60))}
          </div>
          <div style={{ color:"#64748b", fontSize:11, marginBottom:32 }}>현재 몰입 시간</div>

          <div style={{ display:"flex", flexDirection:"column", gap:10, width:"100%" }}>
            <button style={{ ...S.primaryBtn, background:`linear-gradient(135deg,${info.color},${info.color}cc)` }}

            </button>
            <button style={S.ghostBtn} onClick={() => setImmersionPopup(false)}>

  if (alarmActive && alarmContent) {

            <div style={{ color:"#94a3b8", fontSize:13, margin:"6px 0 24px" }}>{OGU_TONES[oguTone]?.emoji} 오구! 정각이 다가옵니다</div>

            <GlassCard style={{ marginBottom:10, textAlign:"left" }}>

              <div style={{ color:"#e2e8f0", fontWeight:600, fontSize:14, lineHeight:1.4 }}>"{alarmContent.quote.text}"</div>

          </div>
        </div>
      </div>

  // ── 로그인 모달
  const LoginModal = loginOpen && (

          <div style={{ fontSize:22, fontWeight:800, background:G.logo, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>오구톡</div>
          <div style={{ color:"#64748b", fontSize:12, marginTop:4 }}>

          const pendingTodos = todos.filter(t=>!t.done);
          const doneTodos   = todos.filter(t=>t.done);
          const quoteObj    = QUOTES[Math.floor(now.getMinutes()/12)%QUOTES.length];

          // 다음 알람까지 남은 초
          const secondsLeft = 60 - now.getSeconds() + (59 - now.getMinutes()) * 60;

          return (
          <>
            {/* ── 상단: 시계 + 다음 알람 ── */}

              </div>
              <div style={{ color:"#475569", fontSize:12 }}>{dateStr} &nbsp;·&nbsp; <span style={{ color:"#64748b" }}>{SS}초</span></div>

              {/* 다음 알람 카운트다운 */}

                <span style={{ fontSize:16 }}>🔔</span>
                <div style={{ textAlign:"left" }}>
                  <div style={{ color:"#818cf8", fontSize:12, fontWeight:700 }}>다음 오구 · {nextAlarm.time}</div>

                  bar: Math.min(100, alarmCount * 10) },

                  </div>

                    background:"rgba(99,102,241,0.2)", color:"#818cf8", fontSize:11, cursor:"pointer" }}
                    onClick={() => setTab("todos")}>전체 →</button>
                </div>

                {pendingTodos.length === 0 ? (
                  <div style={{ textAlign:"center", padding:"12px 0", color:"#34d399", fontSize:13, fontWeight:700 }}>
                    🎉 모든 할일 완료!
                  </div>
                ) : (
                  pendingTodos.slice(0,4).map((t,i) => (
                    <div key={t.id} style={{ display:"flex", alignItems:"center", gap:10,
                      padding:"8px 0",
                      borderBottom: i < Math.min(pendingTodos.length,4)-1 ? "1px solid rgba(255,255,255,0.04)" : "none" }}>
                      {/* 체크 버튼 */}
                      <div style={{ width:20, height:20, borderRadius:6, border:"1.5px solid #334155",
                        cursor:"pointer", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}
                        onClick={() => setTodos(todos.map(x=>x.id===t.id?{...x,done:true}:x))}>
                      </div>
                      {/* 우선순위 점 */}
                      <span style={{ width:6, height:6, borderRadius:3, flexShrink:0,
                        background: t.priority==="high"?"#ef4444":t.priority==="medium"?"#f59e0b":"#475569" }} />
                      <span style={{ color:"#e2e8f0", fontSize:13, flex:1 }}>{t.text}</span>
                    </div>
                  ))
                )}
                {pendingTodos.length > 4 && (
                  <div style={{ color:"#475569", fontSize:11, textAlign:"center", marginTop:8, cursor:"pointer" }}
                    onClick={() => setTab("todos")}>
                    + {pendingTodos.length - 4}개 더 보기
                  </div>
                )}
              </GlassCard>
            )}

            {/* ── 업그레이드 배너 (무료) ── */}
            {!isPremium && (
              <GlassCard style={{ marginBottom:16,
                background:"linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.12))",
                border:"1px solid rgba(99,102,241,0.25)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div>
                    <div style={{ color:"#e2e8f0", fontWeight:700, fontSize:14 }}>✨ 프리미엄 업그레이드</div>
                    <div style={{ color:"#94a3b8", fontSize:11, marginTop:3 }}>목표·할일·키워드·특별 목소리 잠금 해제</div>
                    <div style={{ color:"#818cf8", fontSize:13, fontWeight:800, marginTop:4 }}>월 2,900원</div>
                  </div>
                  <button style={{ padding:"10px 16px", borderRadius:14, border:"none",
                    background:"linear-gradient(135deg,#6366f1,#8b5cf6)",
                    color:"white", fontWeight:700, fontSize:12, cursor:"pointer" }}
                    onClick={() => setIsPremium(true)}>시작하기</button>
                </div>
              </GlassCard>
            )}

            {/* ── 오늘의 명언 (하단 미니) ── */}
            <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
              borderRadius:14, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.05)" }}>
              <span style={{ color:"#334155", fontSize:18 }}>"</span>
              <div style={{ flex:1 }}>
                <div style={{ color:"#64748b", fontSize:12, lineHeight:1.5, fontStyle:"italic" }}>{quoteObj.text}</div>
                <div style={{ color:"#334155", fontSize:10, marginTop:3 }}>— {quoteObj.author}</div>
              </div>
            </div>
          </>
          );
        })()}

        {/* ═══ 할일 ═══ */}
        {tab === "todos" && (
          !isPremium || !premiumFeatures.todos
          ? <PremiumLock feature="할일 관리" onUnlock={() => setIsPremium(true)} />
          : <>
              <SectionHeader title="✅ 할일 관리" action="+ 추가" onAction={() => setShowTodoForm(!showTodoForm)} />
              {showTodoForm && (
                <GlassCard style={{ marginBottom:12 }}>
                  <input type="text" placeholder="할일을 입력하세요" value={todoInput}
                    onChange={e => setTodoInput(e.target.value)}
                    onKeyDown={e => { if(e.key==="Enter" && todoInput.trim()) { setTodos([{ id:Date.now().toString(), text:todoInput, done:false, priority:"medium" },...todos]); setTodoInput(""); setShowTodoForm(false); } }}
                    style={S.input} autoFocus />
                  <div style={{ display:"flex", gap:8, marginTop:10 }}>
                    <button style={S.accentSmallBtn} onClick={() => { if(todoInput.trim()) { setTodos([{ id:Date.now().toString(), text:todoInput, done:false, priority:"medium" },...todos]); setTodoInput(""); setShowTodoForm(false); } }}>저장</button>
                    <button style={S.ghostBtn} onClick={() => setShowTodoForm(false)}>취소</button>
                  </div>
                </GlassCard>
              )}
              <div style={{ color:"#64748b", fontSize:11, marginBottom:12 }}>미완료 {todos.filter(t=>!t.done).length}개 · 완료 {todos.filter(t=>t.done).length}개</div>
              {todos.filter(t=>!t.done).map(t => (
                <GlassCard key={t.id} style={{ marginBottom:8, display:"flex", alignItems:"center", gap:12, padding:"12px 14px" }}>
                  <div style={{ width:22, height:22, borderRadius:7, border:"2px solid #475569", cursor:"pointer", flexShrink:0 }} onClick={() => setTodos(todos.map(x=>x.id===t.id?{...x,done:true}:x))} />
                  <div style={{ flex:1 }}><div style={{ color:"#e2e8f0", fontSize:14, fontWeight:500 }}>{t.text}</div></div>
                  <span style={{ width:8, height:8, borderRadius:4, background: t.priority==="high"?"#ef4444":t.priority==="medium"?"#f59e0b":"#475569" }} />
                  <span style={{ color:"#475569", fontSize:18, cursor:"pointer" }} onClick={() => setTodos(todos.filter(x=>x.id!==t.id))}>×</span>
                </GlassCard>
              ))}
              {todos.filter(t=>t.done).length>0 && <>
                <div style={{ color:"#475569", fontSize:11, fontWeight:700, margin:"16px 0 8px" }}>완료됨</div>
                {todos.filter(t=>t.done).map(t => (
                  <GlassCard key={t.id} style={{ marginBottom:6, display:"flex", alignItems:"center", gap:12, padding:"10px 14px", opacity:0.5 }}>
                    <div style={{ width:22, height:22, borderRadius:7, background:"#6366f1", display:"flex", alignItems:"center", justifyContent:"center", color:"white", fontSize:13, cursor:"pointer" }} onClick={() => setTodos(todos.map(x=>x.id===t.id?{...x,done:false}:x))}>✓</div>
                    <span style={{ color:"#94a3b8", fontSize:13, textDecoration:"line-through" }}>{t.text}</span>
                  </GlassCard>
                ))}
              </>}
            </>
        )}

        {/* ═══ 목표 ═══ */}
        {tab === "goals" && (
          !isPremium || !premiumFeatures.goals
          ? <PremiumLock feature="목표 관리" onUnlock={() => setIsPremium(true)} />
          : <>
              <SectionHeader title="🎯 목표 관리" action="+ 추가" onAction={() => { setShowGoalForm(!showGoalForm); setNewGoalTitle(""); setNewGoalDesc(""); }} />

              {/* 기간 탭 */}
              <div style={{ display:"flex", gap:6, marginBottom:16 }}>
                {["yearly","monthly","weekly","daily"].map(p => (
                  <button key={p} onClick={() => setGoalPeriod(p)}
                    style={{ padding:"7px 14px", borderRadius:20, fontSize:12, cursor:"pointer",
                      border:`1px solid ${goalPeriod===p?"#6366f1":"rgba(255,255,255,0.1)"}`,
                      background: goalPeriod===p?"rgba(99,102,241,0.2)":"transparent",
                      color: goalPeriod===p?"#818cf8":"#94a3b8" }}>
                    {p==="yearly"?"연간":p==="monthly"?"월간":p==="weekly"?"주간":"일간"}
                  </button>
                ))}
              </div>

              {/* 목표 추가 폼 */}
              {showGoalForm && (
                <GlassCard style={{ marginBottom:14, border:"1px solid rgba(99,102,241,0.25)" }}>
                  <div style={{ color:"#818cf8", fontSize:12, fontWeight:700, marginBottom:10 }}>
                    {goalPeriod==="yearly"?"연간":goalPeriod==="monthly"?"월간":goalPeriod==="weekly"?"주간":"일간"} 목표 추가
                  </div>
                  <input
                    type="text" placeholder="목표 제목을 입력하세요" value={newGoalTitle}
                    onChange={e => setNewGoalTitle(e.target.value)}
                    onKeyDown={e => { if(e.key==="Enter" && newGoalTitle.trim()) document.getElementById("goalDescInput").focus(); }}
                    style={{ ...S.input, marginBottom:8 }} autoFocus
                  />
                  <input
                    id="goalDescInput"
                    type="text" placeholder="설명 (선택)" value={newGoalDesc}
                    onChange={e => setNewGoalDesc(e.target.value)}
                    onKeyDown={e => {
                      if(e.key==="Enter" && newGoalTitle.trim()) {
                        setGoals({...goals,[goalPeriod]:[...goals[goalPeriod],{ id:Date.now().toString(), title:newGoalTitle, progress:0, desc:newGoalDesc }]});
                        setNewGoalTitle(""); setNewGoalDesc(""); setShowGoalForm(false);
                      }
                    }}
                    style={S.input}
                  />
                  <div style={{ display:"flex", gap:8, marginTop:10 }}>
                    <button style={S.accentSmallBtn} onClick={() => {
                      if(newGoalTitle.trim()) {
                        setGoals({...goals,[goalPeriod]:[...goals[goalPeriod],{ id:Date.now().toString(), title:newGoalTitle, progress:0, desc:newGoalDesc }]});
                        setNewGoalTitle(""); setNewGoalDesc(""); setShowGoalForm(false);
                      }
                    }}>저장</button>
                    <button style={S.ghostBtn} onClick={() => { setShowGoalForm(false); setNewGoalTitle(""); setNewGoalDesc(""); }}>취소</button>
                  </div>
                </GlassCard>
              )}

              {/* 목표 카드 목록 */}
              {goals[goalPeriod].map(g => (
                <GlassCard key={g.id} style={{ marginBottom:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <div style={{ color:"#e2e8f0", fontWeight:700, fontSize:15, flex:1, marginRight:8 }}>{g.title}</div>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ color:"#818cf8", fontWeight:800, fontSize:16 }}>{g.progress}%</span>
                      <span style={{ color:"#475569", fontSize:16, cursor:"pointer" }}
                        onClick={() => setGoals({...goals,[goalPeriod]:goals[goalPeriod].filter(x=>x.id!==g.id)})}>×</span>
                    </div>
                  </div>
                  <ProgressBar value={g.progress} color={g.progress>=70?"linear-gradient(90deg,#34d399,#6ee7b7)":"linear-gradient(90deg,#6366f1,#8b5cf6)"} />
                  {g.desc && <div style={{ color:"#64748b", fontSize:12, marginTop:8 }}>{g.desc}</div>}
                  <div style={{ display:"flex", gap:6, marginTop:10 }}>
                    {[{d:-10,l:"−10"},{d:+10,l:"+10"}].map(({d,l}) => (
                      <button key={l} style={S.tinyBtn}
                        onClick={() => setGoals({...goals,[goalPeriod]:goals[goalPeriod].map(x=>x.id===g.id?{...x,progress:Math.min(100,Math.max(0,x.progress+d))}:x)})}>
                        {l}
                      </button>
                    ))}
                    {g.progress<100 && (
                      <button style={{ ...S.tinyBtn, background:"rgba(52,211,153,0.15)", color:"#34d399", borderColor:"rgba(52,211,153,0.3)" }}
                        onClick={() => setGoals({...goals,[goalPeriod]:goals[goalPeriod].map(x=>x.id===g.id?{...x,progress:100}:x)})}>
                        완료!
                      </button>
                    )}
                  </div>
                </GlassCard>
              ))}

              {goals[goalPeriod].length === 0 && !showGoalForm && (
                <div style={{ textAlign:"center", padding:"50px 20px" }}>
                  <div style={{ fontSize:48, marginBottom:12 }}>🎯</div>
                  <div style={{ color:"#64748b", fontSize:14 }}>목표를 추가해보세요!</div>
                  <button style={{ ...S.accentSmallBtn, marginTop:14 }} onClick={() => setShowGoalForm(true)}>+ 첫 목표 만들기</button>
                </div>
              )}
            </>
        )}

        {/* ═══ 키워드 인포그래픽 ═══ */}
        {tab === "keywords" && (
          !isPremium || !premiumFeatures.keywords
          ? <PremiumLock feature="키워드 & 주식" onUnlock={() => setIsPremium(true)} />
          : (() => {
              const period = kwTab; // "weekly" | "monthly"

              /* ── 상단 메인 탭 바 ── */
              const MainTabBar = () => (
                <div style={{ display:"flex", background:"rgba(255,255,255,0.04)", borderRadius:14, padding:4, marginBottom:16, gap:4 }}>
                  {[["trending","📊 트렌딩 분석"],["mine","🔍 내 키워드"]].map(([id,label])=>(
                    <button key={id} onClick={()=>{ setKwMainTab(id); setSelectedKw(null); }}
                      style={{ flex:1, padding:"8px 0", borderRadius:10, fontSize:12, fontWeight:700, cursor:"pointer", border:"none",
                        background: kwMainTab===id ? "linear-gradient(135deg,#6366f1,#8b5cf6)" : "transparent",
                        color: kwMainTab===id ? "#fff" : "#64748b", transition:"all 0.2s" }}>
                      {label}
                    </button>
                  ))}
                </div>
              );

              /* ── 주간/월간 탭 ── */
              const PeriodTabs = () => (
                <div style={{ display:"flex", gap:6, marginBottom:14 }}>
                  {["weekly","monthly"].map(t=>(
                    <button key={t} onClick={()=>setKwTab(t)}
                      style={{ padding:"6px 16px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer",
                        border:`1px solid ${kwTab===t?"#6366f1":"rgba(255,255,255,0.1)"}`,
                        background:kwTab===t?"rgba(99,102,241,0.2)":"transparent",
                        color:kwTab===t?"#818cf8":"#94a3b8" }}>
                      {t==="weekly"?"📅 주간":"📆 월간"}
                    </button>
                  ))}
                </div>
              );

              /* ════════════════════════════
                 탭 1 — 트렌딩 분석
              ════════════════════════════ */
              if (kwMainTab === "trending") {
                const td = TRENDING_DATA[period]; // { 경제:{}, AI:{}, 사회:{}, 정치:{} }
                const cats = Object.entries(td);  // [[name, {color,icon,items}], ...]

                // 전체 HOT 키워드 (hot===true) 내림차순
                const allHot = cats.flatMap(([cat, d])=>
                  d.items.filter(it=>it.hot).map(it=>({ ...it, cat, color:d.color, icon:d.icon }))
                ).sort((a,b)=>b.count-a.count);

                // 전체 키워드 top10 (count 기준)
                const top10 = cats.flatMap(([cat, d])=>
                  d.items.map(it=>({ ...it, cat, color:d.color }))
                ).sort((a,b)=>b.count-a.count).slice(0,10);
                const maxTopCount = top10[0]?.count || 1;

                return (
                  <div className="fade-in">
                    <MainTabBar />
                    <PeriodTabs />

                    {/* 🔥 핫 키워드 배지 */}
                    {allHot.length > 0 && (
                      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:16 }}>
                        {allHot.map((it,i)=>(
                          <span key={i} style={{
                            display:"inline-flex", alignItems:"center", gap:4,
                            padding:"5px 11px", borderRadius:20, fontSize:11, fontWeight:700,
                            background:`${it.color}20`, border:`1px solid ${it.color}50`, color:it.color,
                          }}>
                            🔥 {it.kw}
                            <span style={{ color:"#94a3b8", fontSize:9, fontWeight:400 }}>{it.count}건</span>
                          </span>
                        ))}
                      </div>
                    )}

                    {/* 분야별 카드 2×2 그리드 */}
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
                      {cats.map(([catName, d])=>{
                        const maxC = d.items[0]?.count || 1;
                        return (
                          <GlassCard key={catName} style={{ padding:14 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10 }}>
                              <span style={{ fontSize:16 }}>{d.icon}</span>
                              <span style={{ fontSize:13, fontWeight:800, color:d.color }}>{catName}</span>
                            </div>
                            {d.items.map((it,i)=>(
                              <div key={i} style={{ marginBottom:i<d.items.length-1?8:0 }}>
                                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3 }}>
                                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                                    <span style={{ color:"#475569", fontSize:9, fontWeight:700, minWidth:10 }}>#{i+1}</span>
                                    <span style={{ color:"#e2e8f0", fontSize:11, fontWeight:600 }}>{it.kw}</span>
                                    {it.hot && <span style={{ fontSize:8, color:"#f59e0b" }}>🔥</span>}
                                  </div>
                                  <span style={{ color:it.trend>=0?"#34d399":"#f87171", fontSize:10, fontWeight:700 }}>
                                    {it.trend>=0?"▲":"▼"}{Math.abs(it.trend)}%
                                  </span>
                                </div>
                                <div style={{ width:"100%", height:4, borderRadius:2, background:"rgba(255,255,255,0.05)" }}>
                                  <div style={{ width:`${Math.round(it.count/maxC*100)}%`, height:"100%", borderRadius:2, background:d.color, opacity:0.7 }} />
                                </div>
                                <div style={{ color:"#475569", fontSize:9, marginTop:2 }}>{it.count.toLocaleString()}건</div>
                              </div>
                            ))}
                          </GlassCard>
                        );
                      })}
                    </div>

                    {/* HOT TOP 10 전체 순위 바 차트 */}
                    <GlassCard>
                      <div style={{ fontSize:13, fontWeight:700, color:"#cbd5e1", marginBottom:14 }}>
                        🏆 {period==="weekly"?"주간":"월간"} 전체 HOT TOP 10
                      </div>
                      {top10.map((it,i)=>(
                        <div key={i} style={{ marginBottom:10 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                              <span style={{ color: i<3?"#f59e0b":"#475569", fontSize:11, fontWeight:800, minWidth:18 }}>
                                {i<3?["🥇","🥈","🥉"][i]:`#${i+1}`}
                              </span>
                              <span style={{ fontSize:10, padding:"2px 7px", borderRadius:8, background:`${it.color}18`, color:it.color, fontWeight:700 }}>{it.cat}</span>
                              <span style={{ color:"#e2e8f0", fontSize:12, fontWeight:700 }}>{it.kw}</span>
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                              <span style={{ color:it.trend>=0?"#34d399":"#f87171", fontSize:10, fontWeight:700 }}>
                                {it.trend>=0?"▲":"▼"}{Math.abs(it.trend)}%
                              </span>
                              <span style={{ color:"#64748b", fontSize:10 }}>{it.count.toLocaleString()}건</span>
                            </div>
                          </div>
                          <div style={{ width:"100%", height:6, borderRadius:3, background:"rgba(255,255,255,0.05)" }}>
                            <div style={{ width:`${Math.round(it.count/maxTopCount*100)}%`, height:"100%", borderRadius:3, background:`linear-gradient(90deg,${it.color},${it.color}88)`, transition:"width 0.8s ease" }} />
                          </div>
                        </div>
                      ))}
                    </GlassCard>
                  </div>
                );
              }

              /* ════════════════════════════
                 탭 2 — 내 키워드
              ════════════════════════════ */
              // 선택된 키워드 상세 뷰
              const detailKw = selectedKw ? KW_DATA.find(k=>k.id===selectedKw) : null;
              if (detailKw) {
                const p   = detailKw[period];
                const cat = CATEGORY_COLOR[detailKw.category] || "#818cf8";
                return (
                  <div className="fade-in">
                    <MainTabBar />
                    <button style={{ display:"flex", alignItems:"center", gap:6, background:"none", border:"none", color:"#818cf8", fontSize:13, cursor:"pointer", marginBottom:14, padding:0 }}
                      onClick={() => setSelectedKw(null)}>
                      ← 목록으로
                    </button>

                    {/* 키워드 헤더 */}
                    <GlassCard style={{ marginBottom:14 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                        <div>
                          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                            <span style={{ fontSize:20, fontWeight:900, color:"#f1f5f9" }}>{detailKw.keyword}</span>
                            <span style={{ fontSize:9, fontWeight:700, padding:"3px 8px", borderRadius:8, background:`${cat}22`, border:`1px solid ${cat}44`, color:cat }}>{detailKw.category}</span>
                          </div>
                          {detailKw.ticker !== "PERSON" && detailKw.ticker !== "SECTOR" && (
                            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                              <span style={{ color:"#94a3b8", fontSize:14 }}>{detailKw.price}</span>
                              <span style={{ color:detailKw.pos?"#34d399":"#f87171", fontSize:13, fontWeight:700 }}>{detailKw.chg}</span>
                            </div>
                          )}
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ color:p.trend>=0?"#34d399":"#f87171", fontSize:22, fontWeight:900 }}>
                            {p.trend>=0?"▲":"▼"}{Math.abs(p.trend)}%
                          </div>
                          <div style={{ color:"#64748b", fontSize:10, marginTop:2 }}>{period==="weekly"?"주간":"월간"} 트렌드</div>
                        </div>
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginTop:14 }}>
                        {[
                          { label:"언급량",   value:`${p.count}건`,    color:cat },
                          { label:"중요도",   value:`${p.importance}점`, color:"#f59e0b" },
                          { label:"감성지수", value: p.headlines.filter(h=>h.sentiment==="positive").length > p.headlines.filter(h=>h.sentiment==="negative").length ? "긍정 우세":"부정 우세",
                            color: p.headlines.filter(h=>h.sentiment==="positive").length > p.headlines.filter(h=>h.sentiment==="negative").length ? "#34d399":"#f87171" },
                        ].map(s=>(
                          <div key={s.label} style={{ background:"rgba(255,255,255,0.04)", borderRadius:12, padding:"10px 8px", textAlign:"center" }}>

                  <button key={h} onClick={() => setAlarmHours({...alarmHours,[h]:!alarmHours[h]})}
                    style={{ padding:"7px 2px", borderRadius:8, fontSize:11, fontWeight:600, cursor:"pointer",
                      border:`1px solid ${alarmHours[h]?"#6366f1":"rgba(255,255,255,0.08)"}`,
                      background: alarmHours[h]?"rgba(99,102,241,0.2)":"rgba(255,255,255,0.03)",
                      color: alarmHours[h]?"#818cf8":"#64748b" }}>
                    {pad(h)}
                  </button>
                ))}
              </div>
              <div style={{ display:"flex", gap:6, marginTop:10 }}>
                <button style={S.ghostBtn} onClick={() => { const h={}; for(let i=7;i<=22;i++) h[i]=true; setAlarmHours(h); }}>주간</button>
                <button style={S.ghostBtn} onClick={() => { const h={}; for(let i=0;i<24;i++) h[i]=true; setAlarmHours(h); }}>전체</button>
                <button style={S.ghostBtn} onClick={() => setAlarmHours({})}>초기화</button>
              </div>
            </SettingSection>

            {/* ── 기능 활성화 ── */}
            {isPremium && (
              <SettingSection title="🛠️ 기능 활성화">
                {[
                  { key:"todos",          icon:"✅", label:"할일 관리" },
                  { key:"goals",          icon:"🎯", label:"목표 관리" },
                  { key:"keywords",       icon:"📈", label:"키워드 & 주식" },
                  { key:"scheduleAlerts", icon:"🕐", label:"스케줄 알림 (준비중)" },
                ].map(f => (
                  <SettingRow key={f.key} label={f.label} icon={f.icon}>
                    <Toggle on={premiumFeatures[f.key]} onToggle={() => setPremiumFeatures({...premiumFeatures,[f.key]:!premiumFeatures[f.key]})} />
                  </SettingRow>
                ))}
              </SettingSection>
            )}

            {/* ── 백업 & 복원 ── */}
            <SettingSection title="💾 데이터 백업 & 복원">
              <div style={{ color:"#64748b", fontSize:11, marginBottom:14, lineHeight:1.6 }}>
                설정·할일·목표·키워드를 JSON 파일로 저장하고,<br/>
                다른 기기에서 복원해 동일한 환경을 만들 수 있습니다.
              </div>

              {/* 내보내기 */}
              <button
                style={{ width:"100%", padding:"13px", borderRadius:14, border:"none", marginBottom:10,
                  background:"linear-gradient(135deg,#6366f1,#8b5cf6)", color:"white",
                  fontSize:14, fontWeight:700, cursor:"pointer",
                  display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}
                onClick={exportBackup}>
                📤 백업 내보내기 (JSON 다운로드)
              </button>

              {/* 불러오기 */}
              <label style={{ width:"100%", padding:"13px", borderRadius:14,
                border:"1px solid rgba(99,102,241,0.3)", color:"#818cf8",
                fontSize:14, fontWeight:700, cursor:"pointer",
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                background:"rgba(99,102,241,0.08)" }}>
                📥 백업 불러오기 (복원)
                <input type="file" accept=".json" style={{ display:"none" }} onChange={importBackup} />
              </label>

              {/* 메시지 */}
              {backupMsg && (
                <div style={{ marginTop:12, padding:"10px 14px", borderRadius:10,
                  background: backupMsg.startsWith("✅") ? "rgba(52,211,153,0.12)" : "rgba(248,113,113,0.12)",
                  border:`1px solid ${backupMsg.startsWith("✅") ? "rgba(52,211,153,0.3)" : "rgba(248,113,113,0.3)"}`,
                  color: backupMsg.startsWith("✅") ? "#34d399" : "#f87171",
                  fontSize:12, fontWeight:600 }}>
                  {backupMsg}
                </div>
              )}

              {/* 백업 정보 */}
              <div style={{ marginTop:14, display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {[
                  { label:"할일", value:`${todos.length}개`, icon:"✅" },
                  { label:"목표", value:`${Object.values(goals).flat().length}개`, icon:"🎯" },
                  { label:"키워드", value:`${userKeywords.length}개`, icon:"📌" },
                  { label:"알람 설정", value:`${Object.values(alarmHours).filter(Boolean).length}시간대`, icon:"⏰" },
                ].map(item=>(
                  <div key={item.label} style={{ padding:"8px 12px", borderRadius:10,
                    background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.05)" }}>
                    <div style={{ color:"#475569", fontSize:10 }}>{item.icon} {item.label}</div>
                    <div style={{ color:"#818cf8", fontSize:14, fontWeight:800, marginTop:2 }}>{item.value}</div>
                  </div>
                ))}
              </div>
            </SettingSection>

            {isLoggedIn && (
              <button style={{ ...S.ghostBtn, width:"100%", marginTop:8, color:"#ef4444", borderColor:"rgba(239,68,68,0.2)" }}
                onClick={() => { setIsLoggedIn(false); setIsPremium(false); setEmail(""); }}>
                로그아웃
              </button>
            )}
          </>
        )}
      </div>

      {/* 하단 탭바 */}
      <div style={S.tabBar}>
        {[
          { id:"home",     icon:"🏠", label:"홈" },
          { id:"todos",    icon:"✅", label:"할일",   pro:true },
          { id:"goals",    icon:"🎯", label:"목표",   pro:true },
          { id:"keywords", icon:"📈", label:"키워드", pro:true },
          { id:"settings", icon:"⚙️", label:"설정" },
        ].map(t => {
          const active = tab===t.id;
          const locked = t.pro && !isPremium;
          return (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2, padding:"6px 10px", border:"none", borderRadius:12, background: active?"rgba(99,102,241,0.15)":"transparent", color: active?"#818cf8":"#475569", cursor:"pointer", position:"relative", minWidth:48 }}>
              <span style={{ fontSize:18 }}>{t.icon}</span>
              <span style={{ fontSize:9, marginTop:1 }}>{t.label}</span>
              {locked && <span style={{ position:"absolute", top:4, right:8, fontSize:8 }}>🔒</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

const G = {
  logo:   "linear-gradient(135deg, #818cf8, #a78bfa, #c084fc)",
  purple: "linear-gradient(135deg, #6366f1, #8b5cf6)",
  gold:   "linear-gradient(135deg, #f59e0b, #f97316)",
};

const S = {
  root: {

    background:"radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99,102,241,0.15) 0%, transparent 60%), linear-gradient(180deg, #080f1e 0%, #0d1526 50%, #111827 100%)",
    fontFamily:"'Segoe UI', -apple-system, 'Apple SD Gothic Neo', sans-serif",
    color:"#e2e8f0", position:"relative", overflowX:"hidden",
  },
  header: {
    display:"flex", justifyContent:"space-between", alignItems:"center",
    padding:"14px 20px", borderBottom:"1px solid rgba(255,255,255,0.06)",
    backdropFilter:"blur(8px)", position:"sticky", top:0, zIndex:50,
    background:"rgba(8,15,30,0.85)",
  },
  content: { padding:"16px 18px 90px" },
  tabBar: {
    position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
    width:"100%", maxWidth:420, display:"flex", justifyContent:"space-around",
    padding:"8px 8px 16px", background:"rgba(8,15,30,0.92)",
    backdropFilter:"blur(16px)", borderTop:"1px solid rgba(255,255,255,0.06)", zIndex:100,
  },
  primaryBtn: { width:"100%", padding:"14px 20px", border:"none", borderRadius:16, background:"linear-gradient(135deg,#6366f1,#8b5cf6)", color:"white", fontSize:15, fontWeight:700, cursor:"pointer", boxShadow:"0 4px 20px rgba(99,102,241,0.35)" },
  loginBtn: { padding:"6px 16px", borderRadius:10, fontSize:12, fontWeight:700, border:"1px solid rgba(99,102,241,0.4)", background:"rgba(99,102,241,0.12)", color:"#818cf8", cursor:"pointer" },
  socialBtn: { width:"100%", padding:"11px 16px", borderRadius:12, border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.04)", color:"#94a3b8", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 },
  accentSmallBtn: { padding:"8px 18px", borderRadius:10, border:"none", background:"rgba(99,102,241,0.2)", color:"#818cf8", fontSize:12, fontWeight:600, cursor:"pointer" },
  ghostBtn: { padding:"8px 14px", borderRadius:10, border:"1px solid rgba(255,255,255,0.1)", background:"transparent", color:"#94a3b8", fontSize:12, cursor:"pointer" },
  tinyBtn:  { padding:"5px 12px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"transparent", color:"#94a3b8", fontSize:11, cursor:"pointer" },
  input:    { width:"100%", padding:"12px 14px", borderRadius:12, border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.05)", color:"#e2e8f0", fontSize:14, outline:"none", boxSizing:"border-box" },
  modalBg:  { position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:200, backdropFilter:"blur(4px)" },
  modalBox: { width:"100%", maxWidth:420, background:"linear-gradient(180deg,#141d2e,#0d1526)", borderRadius:"24px 24px 0 0", padding:"28px 24px 40px", border:"1px solid rgba(255,255,255,0.08)", borderBottom:"none", boxShadow:"0 -20px 60px rgba(0,0,0,0.5)" },
  alarmBg:  { position:"fixed", inset:0, background:"radial-gradient(ellipse at 50% 30%, rgba(99,102,241,0.25) 0%, rgba(0,0,0,0.95) 70%)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:20 },
  alarmBox: { width:"100%", maxWidth:380, background:"linear-gradient(180deg,rgba(30,41,59,0.9),rgba(8,15,30,0.95))", backdropFilter:"blur(20px)", borderRadius:28, padding:28, textAlign:"center", border:"1px solid rgba(99,102,241,0.3)", boxShadow:"0 0 80px rgba(99,102,241,0.2)" },
  pulseRing1: { position:"absolute", width:300, height:300, borderRadius:"50%", border:"1px solid rgba(99,102,241,0.2)", animation:"pulse 2s ease-out infinite", top:"50%", left:"50%", transform:"translate(-50%,-50%)", pointerEvents:"none" },
  pulseRing2: { position:"absolute", width:500, height:500, borderRadius:"50%", border:"1px solid rgba(99,102,241,0.1)", animation:"pulse 2s ease-out infinite 0.5s", top:"50%", left:"50%", transform:"translate(-50%,-50%)", pointerEvents:"none" },
};

ReactDOM.createRoot(document.getElementById("root")).render(<OguTalkV3 />);
</script>
